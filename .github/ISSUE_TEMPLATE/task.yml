name: Task
description: A unit of work
title: '[task] '
labels: [task]
body:
  - type: markdown
    attributes:
      value: |
        See [docs/workflow.md](../blob/main/docs/workflow.md) §1 for breakdown guidelines (50–200 LOC, single vertical slice).

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What does "done" look like for the user?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist of observable outcomes.
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - feat
        - fix
        - chore
        - docs
        - refactor
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: Branch name (planned)
      placeholder: feature/editor-pane

  - type: dropdown
    id: week
    attributes:
      label: Target week
      options:
        - week-2
        - week-3
